<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Road Interiors – RV Furniture Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:       #7BAA40;
  --green-dark:  #5E8A2A;
  --green-light: #EEF5E3;
  --green-mid:   #A8C873;
  --tan:         #C8A96E;
  --tan-light:   #F8F4EB;
  --dark:        #2A2E1F;
  --mid:         #5A6045;
  --border:      #D9E4C5;
  --white:       #FFFFFF;
  --light-bg:    #F4F7EE;
  --shadow-sm:   0 1px 4px rgba(60,80,20,.08);
  --shadow-md:   0 4px 18px rgba(60,80,20,.12);
  --r:           12px;
  --r-sm:        8px;
}

body { font-family:'Inter',sans-serif; background:var(--light-bg); color:var(--dark); min-height:100vh; }

/* HEADER */
.header { background:var(--white); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:14px; }
.btn-home { margin-left:auto; background:none; border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 14px; font-size:13px; font-weight:600; color:var(--mid); text-decoration:none; white-space:nowrap; transition:border-color .14s,color .14s; }
.btn-home:hover { border-color:var(--green); color:var(--green-dark); }
.hlogo { width:44px; height:44px; flex-shrink:0; }
.hlogo img { width:100%; height:100%; object-fit:contain; }
.hlogo-svg { width:44px; height:44px; }
.htxt h1 { font-family:'Playfair Display',serif; font-size:19px; font-weight:600; color:var(--dark); }
.htxt p  { font-size:12px; color:var(--mid); margin-top:1px; }

/* PROGRESS */
.prog-wrap { background:var(--white); border-bottom:1px solid var(--border); padding:0 24px; }
.prog-steps { display:flex; }
.ps { flex:1; text-align:center; padding:12px 4px 10px; font-size:11px; color:#aaa; border-bottom:2px solid transparent; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ps.active { color:var(--green); border-bottom-color:var(--green); font-weight:600; }
.ps.done   { color:var(--green-mid); border-bottom-color:var(--green-mid); }
.ps-n { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:#eee; font-size:10px; font-weight:700; margin-right:4px; vertical-align:middle; }
.ps.active .ps-n { background:var(--green); color:#fff; }
.ps.done   .ps-n { background:var(--green-mid); color:#fff; }

/* MAIN */
.main { max-width:740px; margin:0 auto; padding:28px 18px 80px; }

/* CARD */
.card { background:var(--white); border-radius:var(--r); border:1px solid var(--border); padding:28px; box-shadow:var(--shadow-sm); }

.qlabel { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--green); margin-bottom:7px; }
.qtitle { font-family:'Playfair Display',serif; font-size:22px; font-weight:500; color:var(--dark); margin-bottom:6px; line-height:1; }
.qsub   { font-size:14px; color:var(--mid); margin-bottom:22px; line-height:1; }

/* CHOICES */
.choices { display:grid; gap:10px; }
.c2 { grid-template-columns:1fr 1fr; }
.c3 { grid-template-columns:1fr 1fr 1fr; }

.choice {
  border:1px solid var(--border); border-radius:var(--r-sm);
  padding:14px 16px; cursor:pointer; background:var(--white);
  text-align:left; transition:border-color .14s,background .14s;
  color:var(--dark); font-family:'Inter',sans-serif;
}
.choice:hover    { border-color:var(--green-mid); background:#f0f0f0; }
.choice.selected { border-color:var(--green); background:#f0f0f0; }
.choice .ct  { font-size:14px; font-weight:600; }
.choice .cs  { font-size:12px; color:var(--mid); margin-top:3px; line-height:1; }

/* TYPE CHOICE WITH IMAGE */
.type-choice { border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--white); text-align:center; overflow:hidden; transition:border-color .14s,box-shadow .14s; display:flex; flex-direction:column; }
.type-choice:hover    { border-color:var(--green-mid); box-shadow:var(--shadow-sm); }
.type-choice.selected { border-color:var(--green); box-shadow:0 0 0 2px rgba(123,170,64,.2); }
.tc-img-wrap { width:100%; padding-bottom:75%; position:relative; overflow:hidden; background:#f0f0f0; display:block; }
.tc-img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; object-position:center; display:block; background:#fff; }
.tc-img-ph { width:100%; aspect-ratio:4/3; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:36px; }
.tc-label { padding:10px; font-size:13px; font-weight:600; color:var(--dark); line-height:1; }

/* INPUTS */
.dim-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.dim-in { width:110px; height:44px; border:1px solid var(--border); border-radius:var(--r-sm); padding:0 14px; font-size:18px; font-family:'Inter',sans-serif; color:var(--dark); background:var(--white); outline:none; transition:border-color .14s; }
.dim-in:focus { border-color:var(--green); }
.dim-in:disabled { background:#f5f5f5; color:#aaa; cursor:not-allowed; }
.dim-unit { font-size:15px; color:var(--mid); font-weight:500; }
.dim-tip { font-size:12px; color:var(--mid); line-height:1; background:#f0f0f0; border-radius:6px; padding:8px 12px; margin-top:6px; }

.check-row { display:flex; align-items:center; gap:8px; margin-top:12px; cursor:pointer; user-select:none; }
.check-row input { accent-color:var(--green); width:16px; height:16px; cursor:pointer; }
.check-row span  { font-size:13px; color:var(--mid); font-weight:500; }

/* PIECE DOTS */
.pdots { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.pd { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; color:#bbb; }
.pd.done   { border-color:var(--green-mid); color:var(--green-mid); }
.pd.active { border-color:var(--green); background:var(--green); color:#fff; }

/* ALERT */
.alert { background:#f0f0f0; border:1px solid var(--green-mid); border-radius:var(--r-sm); padding:12px 14px; font-size:13px; color:var(--dark); line-height:1; margin-bottom:14px; }
.alert strong { color:var(--green-dark); }

/* NAV */
.navrow { display:flex; align-items:center; justify-content:space-between; margin-top:26px; }
.btn-back { background:none; border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 18px; font-size:14px; font-weight:500; cursor:pointer; color:var(--mid); font-family:'Inter',sans-serif; transition:border-color .14s,color .14s; }
.btn-back:hover { border-color:var(--mid); color:var(--dark); }
.btn-next { background:var(--green); border:none; border-radius:var(--r-sm); padding:12px 28px; font-size:15px; font-weight:700; cursor:pointer; color:#fff; font-family:'Inter',sans-serif; transition:background .14s,transform .1s; }
.btn-next:hover:not(:disabled) { background:var(--green-dark); }
.btn-next:active:not(:disabled) { transform:scale(.98); }
.btn-next:disabled { opacity:.35; cursor:not-allowed; }

/* RESULTS */
.rh h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:500; color:var(--dark); }
.rh p   { font-size:14px; color:var(--mid); margin-top:4px; }
.psect  { margin-bottom:32px; }
.psect-title { font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--green); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.coll-group { margin-bottom:28px; }
.coll-header { font-family:'Playfair Display',serif; font-size:16px; font-weight:500; color:var(--dark); background:var(--tan-light); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 14px; margin-bottom:12px; display:inline-block; }

/* PRODUCT GRID */
.pgrid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:520px){ .pgrid { grid-template-columns:1fr; } }

/* pcard rules consolidated below */
.pprice { font-size:17px; font-weight:700; color:var(--green-dark); margin-bottom:7px; }
.ptags  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
.tag    { font-size:10px; font-weight:600; padding:3px 7px; border-radius:20px; background:#f0f0f0; color:var(--mid); }
.tag.hl { background:#EDF6D6; color:var(--green-dark); }

/* OPTIONS inside card */
.popts { border-top:1px solid var(--border); padding-top:10px; margin-top:6px; }
.popts .opt-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--mid); display:block; margin-bottom:4px; margin-top:8px; }
.popts .opt-label:first-child { margin-top:0; }
.opt-row { display:flex; gap:5px; flex-wrap:wrap; }
.obtn { font-size:11px; font-weight:600; padding:5px 9px; border-radius:20px; border:1px solid var(--border); background:var(--white); cursor:pointer; color:var(--mid); font-family:'Inter',sans-serif; transition:all .12s; }
.obtn:hover { border-color:var(--green-mid); color:var(--dark); }
.obtn.sel   { border-color:var(--green); background:#f0f0f0; color:var(--green-dark); }

.psel-row { display:flex; align-items:center; gap:6px; margin-top:10px; cursor:pointer; }
.psel-row input { accent-color:var(--green); width:16px; height:16px; cursor:pointer; }
.psel-row span  { font-size:12px; font-weight:600; color:var(--mid); }
.psel-row.active span { color:var(--green-dark); }
.view-link { display:block; margin-top:8px; font-size:12px; color:var(--green-mid); text-decoration:none; font-weight:600; }
.view-link:hover { color:var(--green); text-decoration:underline; }

/* CART */
.cart-box { background:var(--white); border:1px solid var(--border); border-radius:var(--r); padding:22px; margin-top:28px; box-shadow:var(--shadow-sm); }
.cart-box h3 { font-family:'Playfair Display',serif; font-size:18px; font-weight:500; color:var(--dark); margin-bottom:14px; }
.ci { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); gap:10px; }
.ci:last-of-type { border-bottom:none; }
.ci-name  { font-size:13px; font-weight:600; color:var(--dark); }
.ci-opts  { font-size:11px; color:var(--mid); margin-top:2px; }
.ci-price { font-size:14px; font-weight:700; color:var(--green-dark); white-space:nowrap; }
.ctotal   { display:flex; justify-content:space-between; align-items:center; padding-top:14px; margin-top:4px; border-top:2px solid var(--border); }
.ctotal span:first-child { font-size:15px; font-weight:600; }
.ctotal span:last-child  { font-size:20px; font-weight:700; color:var(--green-dark); }

.btn-cart { width:100%; margin-top:16px; background:var(--green); border:none; border-radius:var(--r-sm); padding:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; font-family:'Inter',sans-serif; transition:background .14s; }
.btn-cart:hover:not(:disabled) { background:var(--green-dark); }
.btn-cart:disabled { opacity:.4; cursor:not-allowed; }

/* CONTACT */
.cbox { margin-top:22px; background:#f0f0f0; border:1px solid var(--border); border-radius:var(--r); padding:22px; }
.cbox h4 { font-family:'Playfair Display',serif; font-size:16px; font-weight:500; margin-bottom:10px; }
.citem { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--mid); margin-bottom:7px; }
.citem a { color:var(--green-dark); font-weight:600; text-decoration:none; }
.citem a:hover { text-decoration:underline; }

.btn-restart { background:#fff3f3; border:2px solid #e05555; border-radius:var(--r-sm); padding:11px 22px; font-size:14px; font-weight:700; color:#c0392b; cursor:pointer; font-family:'Inter',sans-serif; margin-top:20px; transition:all .14s; }
.btn-restart:hover { background:#e05555; color:#fff; border-color:#c0392b; }

.no-results { padding:22px; text-align:center; color:var(--mid); font-size:14px; background:#f0f0f0; border-radius:var(--r-sm); }

@media(max-width:600px){
  .c3  { grid-template-columns:1fr 1fr; }
  .c2  { grid-template-columns:1fr; }
  .card { padding:18px; }
  .choices.type-grid { grid-template-columns:1fr 1fr; }
}


/* SKIP BUTTONS */
.skip-row { display:flex; gap:8px; justify-content:flex-end; margin-bottom:14px; flex-wrap:wrap; }
.btn-skip { background:none; border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:var(--mid); cursor:pointer; font-family:'Inter',sans-serif; transition:all .12s; }
.btn-skip:hover { border-color:var(--green); color:var(--green-dark); }
.btn-skip-all { background:none; border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; color:var(--mid); cursor:pointer; font-family:'Inter',sans-serif; transition:all .12s; }
.btn-skip-all:hover { border-color:var(--tan); color:var(--tan); }

/* SLIDEOUT MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal-box { background:var(--white); border-radius:var(--r); padding:26px; max-width:400px; width:100%; box-shadow:0 8px 40px rgba(0,0,0,.18); }
.modal-box h3 { font-family:'Playfair Display',serif; font-size:18px; font-weight:500; color:var(--dark); margin-bottom:6px; }
.modal-box p  { font-size:13px; color:var(--mid); margin-bottom:18px; line-height:1; }
.modal-field  { margin-bottom:14px; }
.modal-field label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--mid); margin-bottom:5px; }
.modal-row    { display:flex; align-items:center; gap:10px; }
.modal-in     { width:110px; height:40px; border:1px solid var(--border); border-radius:var(--r-sm); padding:0 12px; font-size:16px; font-family:'Inter',sans-serif; color:var(--dark); outline:none; transition:border-color .14s; }
.modal-in:focus { border-color:var(--green); }
.modal-in:disabled { background:#f5f5f5; color:#aaa; cursor:not-allowed; }
.modal-unit   { font-size:14px; color:var(--mid); }
.modal-check  { display:flex; align-items:center; gap:7px; margin-top:7px; cursor:pointer; font-size:12px; color:var(--mid); font-weight:500; }
.modal-check input { accent-color:var(--green); width:15px; height:15px; cursor:pointer; }
.modal-btns   { display:flex; gap:10px; margin-top:20px; }
.modal-btns .btn-next { flex:1; padding:11px; font-size:14px; }
.modal-btns .btn-back { flex:0 0 auto; }

.team-box { background:var(--white); border:1px solid var(--green); border-radius:var(--r); padding:22px; margin-top:20px; box-shadow:var(--shadow-sm); }
.team-box h3 { font-family:'Playfair Display',serif; font-size:18px; font-weight:500; color:var(--dark); margin-bottom:6px; }
.team-box p { font-size:13px; color:var(--mid); margin-bottom:16px; }
.team-toggle { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--r); padding:12px 18px; font-size:15px; font-weight:600; cursor:pointer; text-align:left; display:flex; justify-content:space-between; align-items:center; }
.team-toggle:hover { background:var(--green-dark); }
.team-form { display:none; margin-top:18px; }
.team-form.open { display:block; }
.tf-row { margin-bottom:14px; }
.tf-row label { display:block; font-size:13px; font-weight:600; color:var(--dark); margin-bottom:5px; }
.tf-row input, .tf-row textarea { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; box-sizing:border-box; color:var(--dark); background:#fff; }
.tf-row input:focus, .tf-row textarea:focus { outline:none; border-color:var(--green); }
.tf-row textarea { min-height:90px; resize:vertical; }
.tf-required { color:#c00; }
.team-summary { background:#f7f9f3; border:1px solid #dde8cc; border-radius:6px; padding:12px 14px; margin-bottom:16px; font-size:12px; color:var(--mid); line-height:1; }
.team-summary strong { color:var(--dark); }
.btn-send { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--r); padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; }
.btn-send:hover { background:var(--green-dark); }
.btn-send:disabled { background:#aaa; cursor:not-allowed; }
.send-success { background:#f0f7e8; border:1px solid #b5d98a; border-radius:var(--r); padding:16px; text-align:center; margin-top:16px; }
.send-success h4 { color:var(--green-dark); margin:0 0 6px; font-size:16px; }
.send-success p { font-size:13px; color:var(--mid); margin:0; }


/* ── Enhanced product card ── */
.pcard { display:flex; flex-direction:column; background:var(--white); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; transition:border-color .15s, box-shadow .15s; }
.pcard.selected { border-color:var(--green); box-shadow:0 0 0 2px rgba(123,170,64,.18); }
.pimg { width:100%; height:180px; object-fit:contain; object-position:center; display:block; background:#fff; }
.pph  { width:100%; height:180px; display:flex; align-items:center; justify-content:center; font-size:48px; background:#f5f5f5; }
.pbody { padding:12px 14px; flex:1; display:flex; flex-direction:column; }
.pnam  { font-weight:600; font-size:14px; color:var(--dark); margin-bottom:4px; line-height:1; }
.pprice { font-size:18px; font-weight:700; color:var(--green-dark); margin-bottom:6px; }
.ptags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
/* Material selector */
.mat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--mid); margin-bottom:5px; margin-top:4px; }
.mat-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.mbtn { font-size:12px; padding:4px 10px; border:1px solid var(--border); border-radius:20px; background:var(--white); cursor:pointer; color:var(--dark); transition:all .12s; white-space:nowrap; }
.mbtn:hover { border-color:var(--green); }
.mbtn.sel { background:var(--green); border-color:var(--green); color:#fff; font-weight:600; }
/* Other opts below material */
.popts { margin-top:4px; }
.opt-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--mid); display:block; margin-top:8px; margin-bottom:4px; }
.opt-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
.obtn { font-size:12px; padding:4px 10px; border:1px solid var(--border); border-radius:20px; background:var(--white); cursor:pointer; color:var(--dark); transition:all .12s; }
.obtn:hover { border-color:var(--green); }
.obtn.sel { background:var(--green); border-color:var(--green); color:#fff; font-weight:600; }
.psel-row { display:flex; align-items:center; gap:8px; margin-top:auto; padding-top:10px; cursor:pointer; font-size:13px; font-weight:600; color:var(--green-dark); border-top:1px solid var(--border); padding-top:10px; }
.psel-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--green); cursor:pointer; }
.view-link { font-size:12px; color:var(--mid); text-decoration:none; margin-top:6px; display:block; }
.view-link:hover { color:var(--green-dark); }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

  <div class="htxt">
    <h1>Open Road Interiors</h1>
    <p>RV Furniture Finder — Find your perfect fit</p>
  </div>
  <a href="https://openroadinteriors.com" class="btn-home">← Return to Website</a>
</div>

<div class="prog-wrap"><div class="prog-steps" id="prog"></div></div>

<div class="main"><div id="app"></div></div>


<script>
/* ─────────────────────────────────────────────

const TYPE_PHOTOS = {

/* ─────────────────────────────────────────────
   MATCHING
───────────────────────────────────────────── */
function match(piece){
  return P.filter(p=>{
    if(p.type!==piece.type) return false;

    // Width filter (skip if "not sure")
    if(!piece.widthUnsure && piece.widthVal){
      if(p.width > parseInt(piece.widthVal)) return false;
    }

    // Depth / extension filter
    const dep = piece.depth;
    if(dep==='limited'){
      // Only zero-wall and wall-hugger — they don't extend far into room
      if(!p.tags.some(t=>t==='Zero-Wall (Can Touch Wall)'||t==='Wall-Hugger')) return false;
    }
    // dep==='open' or null → no restriction

    const f = piece.features;
    if(f.includes("Big Man's (oversized seat)") && !p.tags.includes("Big Man's")) return false;
    if(f.includes('Electric Lift')              && !p.tags.includes('Electric Lift')) return false;
    if(f.includes('Swivel Base')                && !p.tags.includes('Swivel')) return false;
    if(f.includes('Rocker (No Swivel)')                     && !p.tags.includes('Rocker (No Swivel)')) return false;
        if(f.includes('Zero-Wall only')             && !p.tags.includes('Zero-Wall (Can Touch Wall)')) return false;
    if(f.includes('Fold-Down Back')             && !p.tags.includes('Fold-Down Back')) return false;
    if(f.includes('Reclining')                  && !p.tags.includes('Reclining')) return false;
    if(f.includes('Center Console')                && !p.tags.includes('Center Console')) return false;
    if(f.includes("Narrow Arm (4\" less width, no cupholders)") && !p.id.endsWith('-na')) return false;
    if(f.includes('Queen Size bed')             && !p.tags.includes('Queen Size')) return false;
    if(f.includes('Jack Knife style')           && !p.tags.includes('Jack Knife')) return false;
    if(f.includes('Hide-A-Bed style')           && !p.tags.includes('Hide-A-Bed')) return false;
    if(f.includes('Tri-Fold style')              && !p.tags.includes('Tri-Fold')) return false;
    return true;
  }).sort((a,b)=>b.width-a.width);
}

───────────────────────────────────────────── */
function upgradePrice(sp){
  if(!sp) return 0;
  return Object.values(sp.opts||{}).reduce((sum,v)=>{
    const m = (v||'').match(/\+\$(\d+)/);
    return sum + (m ? parseInt(m[1]) : 0);
  },0);
}
function selTotal(){ return S.sel.reduce((s,sp)=>{ const mat=sp.material||getDefaultMaterial(sp.product); return s+getMaterialPrice(sp.product,mat)+upgradePrice(sp); },0); }

function buildQuizSummaryText(){
  let lines=[];
  S.pieces.forEach((piece,pi)=>{
    const tl=(TYPES[piece.type]&&TYPES[piece.type].label)||piece.type;
    lines.push(`📦 Piece ${pi+1}: ${tl}`);
    lines.push('');

    // Slideout
    if(piece.slideout==='no') lines.push('  Slideout:       No slideout');
    else if(piece.slideout==='raised') lines.push('  Slideout:       Raised (elevated floor)');
    else if(piece.slideout==='flush') lines.push('  Slideout:       Flush (same floor level)');

    // Width
    if(piece.widthUnsure) lines.push('  Width:          Not sure / needs measuring');
    else if(piece.widthVal) lines.push(`  Width:          Up to ${piece.widthVal}"`);

    // Depth
    if(piece.slideDepthUnknown) lines.push('  Slideout depth: Unknown');
    else if(piece.slideDepth) lines.push(`  Slideout depth: ${piece.slideDepth}"`);

    // Height step
    if(piece.slideHeightUnknown) lines.push('  Step height:    Unknown');
    else if(piece.slideHeight) lines.push(`  Step height:    ${piece.slideHeight}"`);

    // Max depth
    if(piece.maxDepthUnknown) lines.push('  Max depth:      Unknown');
    else if(piece.maxDepth) lines.push(`  Max depth:      ${piece.maxDepth}"`);

    // Features selected
    if(piece.features && piece.features.length) lines.push(`  Features:       ${piece.features.join(', ')}`);

    // Selected product + options
    const sel=S.sel.filter(s=>s.pieceIdx===pi);
    if(sel.length){
      sel.forEach(sp=>{
        lines.push('');
        lines.push(`  Selected:       ${sp.product.name}`);
        const opts=Object.entries(sp.opts||{}).filter(([k,v])=>v&&!v.startsWith('No ')&&!v.includes('standard'));
        if(opts.length) lines.push(`  Options:        ${opts.map(([k,v])=>v).join(', ')}`);
      });
    } else {
      lines.push('');
      lines.push('  Selected:       Not yet selected');
    }
    lines.push('');
    lines.push('  ─────────────────────────────');
    lines.push('');
  });
  return lines.join('\n');
}

function sendToTeam(){
  const name=document.getElementById('tf-name').value.trim();
  const email=document.getElementById('tf-email').value.trim();
  const phone=document.getElementById('tf-phone').value.trim();
  const message=document.getElementById('tf-message').value.trim();

  if(!name){ alert('Please enter your name.'); return; }
  if(!email){ alert('Please enter your email address.'); return; }

  const btn=document.getElementById('btnSend');
  btn.disabled=true;
  btn.textContent='Sending…';

  // Build measurements text
  const quizSummary=buildQuizSummaryText();

  // Build selected products text
  const selList=S.sel.map(sp=>{
    const mat=sp.material||getDefaultMaterial(sp.product);
    const matPrice=getMaterialPrice(sp.product,mat);
    const opts=[mat,...Object.entries(sp.opts||{}).filter(([k,v])=>v&&!v.startsWith('No ')&&!v.includes('standard')).map(([k,v])=>v)].filter(Boolean).join(', ');
    return '• '+sp.product.name+(opts?` (${opts})`:'')+` — $${(matPrice+upgradePrice(sp)).toLocaleString()}`;
  }).join('\n');
  const total=selTotal();

  const quoteRequested=document.getElementById('tf-quote')?.checked;

  const bodyText=[
    quoteRequested ? '⭐ QUOTE REQUESTED — Please send a full quote for the items below.' : '',
    quoteRequested ? '' : '',
    '📋 Selected Items',
    '',
    selList||'  (no products selected)',
    '',
    selList ? `  Estimated Total: $${total.toLocaleString()}` : '',
    message ? `\n💬 Customer Note\n\n  ${message}` : '',
  ].filter(s => s !== undefined).join('\n').trim();

  const measureText=[
    '📐 Space Measurements',
    '',
    quizSummary,
  ].join('\n').trim();

  // Try to find and submit the Shopify contact form on this page (same-domain embed)
  const shopifyForm=document.querySelector('form[action*="/contact"]');
  if(shopifyForm){
    // Fill the real form and submit it — works because we have the session cookie
    const setField=(name,val)=>{const el=shopifyForm.querySelector(`[name="${name}"]`);if(el)el.value=val;};
    setField('contact[Name]', name);
    setField('contact[email]', email);
    setField('contact[Phone]', phone||'');
    setField('contact[Measurements]', measureText);
    setField('contact[Body]', bodyText);
    shopifyForm.submit();
    return;
  }

  // Not on Shopify — open contact page with data in URL (local file testing)
  const params=new URLSearchParams();
  params.set('contact[Name]', name);
  params.set('contact[email]', email);
  params.set('contact[Phone]', phone||'');
  params.set('contact[Measurements]', measureText);
  params.set('contact[Body]', bodyText);
  window.open('https://openroadinteriors.com/pages/contact?'+params.toString(),'_blank');
  document.getElementById('teamFormWrap').innerHTML=`
    <div class="send-success">
      <h4>📬 Almost done!</h4>
      <p>We've opened your contact form in a new tab with everything pre-filled — just press <strong>Send Message</strong> to complete it.</p>
    </div>`;
}

function setMaterial(pieceIdx, productId, material){
  const sp = S.sel.find(s => s.pieceIdx===pieceIdx && s.product.id===productId);
  if(sp){
    sp.material = material;
  } else {
    // Store pending material for when card gets selected
    S.pendingMat[pieceIdx+':'+productId] = material;
  }
  render();
}

function getMaterialPrice(product, material){
  if(!product.materialPrices) return product.price;
  return product.materialPrices[material] || product.price;
}

function getDefaultMaterial(product){
  if(!product.materialPrices) return null;
  // Default to Ultraleather if available, else Premium Fabric, else first
  if(product.materialPrices['Ultraleather']) return 'Ultraleather';
  if(product.materialPrices['Premium Fabric']) return 'Premium Fabric';
  return Object.keys(product.materialPrices)[0];
}

function skipPiece(){
  // Mark current piece with a skip flag and advance to next piece or results
  if(S.cur < S.numPieces-1){
    S.pieces[S.cur].skipped = true;
    S.cur++;
    S.sub='type';
  } else {
    // Last piece — go straight to results
    S.pieces[S.cur].skipped = true;
    S.phase='results';
  }
  render();
}

function skipToResults(){
  S.phase='results';

}

      <div class="qsub">We'll walk you through each piece individually and find what fits your RV perfectly.</div>
      <div class="choices c3">
        ${[1,2,3,4,'5+'].map(n=>`<button class="choice ${S.numPieces==n?'selected':''}" onclick="selCount(${n==='5+'?5:n})">
          <div class="ct">${n}</div><div class="cs">${n==1?'Just one piece':n==='5+'?'Five or more':'pieces'}</div>
        </button>`).join('')}
      </div>
      <div class="navrow"><span></span>
        <button class="btn-next" onclick="startPieces()">Let's get started →</button>
      </div></div>`;
    return;
  }

  /* ── PIECE PHASES ── */
  if(phase==='piece'){
    const piece=pieces[cur];
    const pl = numPieces>1 ? `Piece ${cur+1} of ${numPieces} · ` : '';
    const skipBtns = numPieces>1 ? `<div class="skip-row">
      ${cur < numPieces-1 ? `<button class="btn-skip" onclick="skipPiece()">Skip this piece →</button>` : ''}
      <button class="btn-skip-all" onclick="skipToResults()">Skip to results</button>
    </div>` : '';

    /* TYPE */
    if(sub==='type'){
      setProgress(1);
      app.innerHTML=`<div class="card">${dots()}${skipBtns}
        <div class="qlabel">${pl}Furniture type</div>
        <div class="qtitle">What type of furniture${numPieces>1?' for piece '+(cur+1):''}?</div>
        <div class="qsub">Select the category that best describes what you need.</div>
        <div class="choices" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          ${Object.entries(TYPES).map(([k,v])=>`
            <div class="type-choice ${piece.type===k?'selected':''}" onclick="selType('${k}')">
              ${TYPE_PHOTOS[k]
                ? `<div class="tc-img-wrap"><img class="tc-img" src="${TYPE_PHOTOS[k]}" alt="${v.label}"></div>`
                : `<div class="tc-img-ph">${v.icon}</div>`}
              <div class="tc-label">${v.label}</div>
            </div>`).join('')}
        </div>
        <div class="navrow">
          <button class="btn-back" onclick="goBack()">← Back</button>
          <button class="btn-next" onclick="nextSub()" ${!piece.type?'disabled':''}>Continue →</button>
        </div></div>`;
    }

    /* SLIDEOUT */
    if(sub==='slideout'){
      setProgress(2);
      app.innerHTML=`<div class="card">${dots()}${skipBtns}
        <div class="qlabel">${pl}Placement</div>
        <div class="qtitle">Will this piece go on a slideout?</div>
        <div class="qsub">This helps us tailor our recommendations — all furniture options will still be shown.</div>
        <div class="choices">
          <button class="choice ${piece.slideout==='no'?'selected':''}" onclick="selSlide('no')">
            <div class="ct">🏠 No — main floor</div><div class="cs">Furniture stays on the main cabin floor</div></button>
          <button class="choice ${piece.slideout==='yes'?'selected':''}" onclick="selSlide('yes')">
            <div class="ct">↔️ Yes — flush slideout floor</div><div class="cs">Slideout floor is level with the main floor</div></button>
          <button class="choice ${piece.slideout==='raised'?'selected':''}" onclick="selSlide('raised')">
            <div class="ct">⬆️ Yes — raised slideout floor</div><div class="cs">The slideout floor sits higher than the main floor</div></button>
        </div>
        <div class="navrow">
          <button class="btn-back" onclick="goBack()">← Back</button>
          <button class="btn-next" onclick="nextSub()" ${!piece.slideout?'disabled':''}>Continue →</button>
        </div></div>`;
    }

    /* WIDTH */
    if(sub==='width'){
      setProgress(2);
      const isSlide=piece.slideout!=='no';
      app.innerHTML=`<div class="card">${dots()}${skipBtns}
        <div class="qlabel">${pl}Available width</div>
        <div class="qtitle">What's the available width${isSlide?' in the slideout':''}?</div>
        <div class="qsub">Measure from wall to wall at the narrowest point where the furniture will sit.</div>
        <div class="dim-row">
          <input class="dim-in" id="w-in" type="number" min="20" max="130"
            placeholder="${piece.widthUnsure?'Optional estimate':'e.g. 78'}"
            value="${piece.widthVal||''}"
            oninput="updWidth(this.value)">
          <span class="dim-unit">inches</span>
        </div>
        <div class="dim-tip">${piece.widthUnsure
          ? '💡 You can still type an estimate if you have one — it helps narrow down options. Or just leave it blank to see all sizes.'
          : '💡 Measure at the narrowest point, including any trim or door frames.'}</div>
        <label class="check-row" onclick="toggleUnsure()">
          <input type="checkbox" id="unsure-chk" ${piece.widthUnsure?'checked':''} onclick="event.stopPropagation();toggleUnsure()">
          <span>Not sure of my exact measurement</span>
        </label>
        ${piece.slideout==='raised'?'<div class="alert" style="margin-top:14px"><strong>Raised slideout detected</strong> — we offer a custom roller system that adjusts to any height so furniture rolls smoothly between levels. Ask us for details!</div>':''}
        <div class="navrow">
          <button class="btn-back" onclick="goBack()">← Back</button>
          <button class="btn-next" id="w-btn" onclick="nextSub()" ${(!piece.widthVal&&!piece.widthUnsure)?'disabled':''}>Continue →</button>
        </div></div>`;
    }

    /* DEPTH */
    if(sub==='depth'){
      setProgress(2);
      app.innerHTML=`<div class="card">${dots()}${skipBtns}
        <div class="qlabel">${pl}Room depth</div>
        <div class="qtitle">Is there a limit to how far the piece can extend out into the room?</div>
        <div class="qsub">Some furniture extends further when reclined. If space is tight in front of the piece, this matters.</div>
        <div class="choices">
          <button class="choice ${piece.depth==='open'?'selected':''}" onclick="selDepth('open')">
            <div class="ct">✅ No limit — plenty of room in front</div>
            <div class="cs">Any style will fit — standard, wall-hugger, or zero-wall</div></button>
          <button class="choice ${piece.depth==='limited'?'selected':''}" onclick="selDepth('limited')">
            <div class="ct">⚠️ Yes — limited space in front of where it will sit</div>
            <div class="cs">We'll show wall-hugger and zero-wall options that stay closer to the wall when reclined</div></button>
        </div>
        <div class="navrow">
          <button class="btn-back" onclick="goBack()">← Back</button>
          <button class="btn-next" onclick="nextSub()" ${!piece.depth?'disabled':''}>Continue →</button>
        </div></div>`;
    }

    /* FEATURES */
    if(sub==='features'){
      setProgress(3);
      const featList = TYPE_FEATURES[piece.type]||[];
      app.innerHTML=`<div class="card">${dots()}${skipBtns}
        <div class="qlabel">${pl}Special features</div>
        <div class="qtitle">Any must-have features?</div>
        <div class="qsub">${featList.length?'Select all that apply, or skip ahead if you have no specific requirements.':'No additional feature filters for this category.'}</div>
        ${featList.length?`<div class="choices c2">
          <button class="choice ${piece.features.length===0?'selected':''}" onclick="clearFeats()"><div class="ct">No preference</div><div class="cs">Show all options</div></button>
          ${featList.map((f,fi)=>`<button class="choice ${piece.features.includes(f)?'selected':''}" data-fi="${fi}" onclick="togFeatIdx(this.dataset.fi)"><div class="ct">${f}</div></button>`).join('')}
        </div>`:''}
        <div class="navrow">
          <button class="btn-back" onclick="goBack()">← Back</button>
          <button class="btn-next" onclick="finishPiece()">${cur<numPieces-1?'Next piece →':'See my matches →'}</button>
        </div></div>`;
    }
    return;
  }

  /* ── RESULTS ── */
  if(phase==='results'){
    setProgress(4);
    let html=`<div class="rh" style="margin-bottom:20px">
      <h2>Your furniture matches 🎉</h2>
      <p>Select pieces below, customize your options, and add them all to your cart.</p>
    </div>`;

    const activePieces=S.pieces.filter(p=>!p.skipped);
    S.pieces.map((piece,pi)=>({piece,pi})).filter(({piece})=>!piece.skipped).forEach(({piece,pi},activeIdx)=>{
      const matches=match(piece);
      const tl=(TYPES[piece.type]&&TYPES[piece.type].label||piece.type);
      const widthLabel = piece.widthUnsure ? 'all widths (estimated)' : `up to ${piece.widthVal}"`;
      const depthLabel = piece.slideDepth ? `, ${piece.slideDepth}" deep` : (piece.slideDepthUnknown ? ', depth unknown' : '');
      const heightLabel = piece.slideHeight ? `, ${piece.slideHeight}" step` : (piece.slideHeightUnknown ? ', step height unknown' : '');

      html+=`<div class="psect">
        <div class="psect-title">
          ${(TYPES[piece.type]&&TYPES[piece.type].icon||'')} ${activePieces.length>1?`Piece ${activeIdx+1}: `:''}${tl} — ${widthLabel}
          ${piece.slideout!=='no'?`<span class="tag hl">${piece.slideout==='raised'?'Raised Slideout':'Flush Slideout'}${depthLabel}${heightLabel}</span>`:''}
          ${piece.widthUnsure?'<span class="tag" style="background:#FFF8E1;color:#856404">Estimated width</span>':''}
        </div>`;

      if(piece.slideout==='raised')
        // Raised slideout note shown in slideout modal only — not repeated here
      if(piece.widthUnsure)
        html+=`<div class="alert">Showing all sizes since you weren&#39;t sure of the measurement. Once you measure, you can filter further by contacting us or browsing by width on each product page.</div>`;

      if(!matches.length){
        html+=`<div class="no-results">No exact matches for these specs. <a href="https://openroadinteriors.com/pages/contact" style="color:var(--green-dark);font-weight:600">Contact us</a> — we can often find a custom solution!</div>`;
      } else {
        // Group matches by collection
        const groups = [];
        const seen = {};
        matches.forEach(p => {
          const coll = p.collection || 'Other';
          if (!seen[coll]) { seen[coll] = []; groups.push({coll, items: seen[coll]}); }
          seen[coll].push(p);
        });

        groups.forEach(({coll, items}) => {
          html+=`<div class="coll-group">
            <div class="coll-header">${coll}</div>
            <div class="pgrid">`;
          items.forEach(p => {
          const sp=S.sel.find(s=>s.pieceIdx===pi&&s.product.id===p.id);
          const isSel=!!sp;
          const optsDef=getProductOptions(p);

          // Material pricing
          const mats = p.materialPrices ? Object.keys(p.materialPrices) : [];
          const pendingKey=pi+':'+p.id; const activeMat = isSel ? (sp.material || getDefaultMaterial(p)) : (S.pendingMat[pendingKey] || getDefaultMaterial(p));
          const basePrice = activeMat && p.materialPrices ? (p.materialPrices[activeMat]||p.price) : p.price;
          const total = basePrice + (isSel ? upgradePrice(sp) : 0);

          // Material selector HTML (always visible)
          let matHTML = '';
          if(mats.length > 1){
            matHTML = '<div class="mat-label">Material</div><div class="mat-row">';
            matHTML += mats.map(m=>`<button class="mbtn ${m===activeMat?'sel':''}" onclick="event.stopPropagation();setMaterial(${pi},'${p.id}','${m}')">${m}</button>`).join('');
            matHTML += '</div>';
          }

          // Other options (only when selected)
          let optsHTML='';
          if(isSel && Object.keys(optsDef).length){
            optsHTML='<div class="popts">';
            for(const[key,cfg] of Object.entries(optsDef)){
              optsHTML+=`<span class="opt-label">${cfg.label}</span><div class="opt-row">`;
              optsHTML+=cfg.opts.map((o,oi)=>`<button class="obtn ${(sp.opts[key]||'')=== o?'sel':''}" data-pi="${pi}" data-pid="${p.id}" data-key="${key}" data-oi="${oi}" onclick="event.stopPropagation();setOptIdx(this)">${o}</button>`).join('');
              optsHTML+='</div>';
            }
            optsHTML+='</div>';
          }

          html+=`<div class="pcard ${isSel?'selected':''}" >
            ${p.img
              ?`<img class="pimg" src="${p.img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')">`
              :`<div class="pph">${(TYPES[p.type]&&TYPES[p.type].icon||'🪑')}</div>`}
            <div class="pbody">
              <div class="pnam">${p.name}</div>
              <div class="pprice">$${total.toLocaleString()}</div>
              <div class="ptags">
                <span class="tag hl">${p.width}"</span>
                ${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
              </div>
              ${matHTML}
              ${optsHTML}
              <div class="psel-row" onclick="toggleSel(${pi},'${p.id}')">
                <input type="checkbox" ${isSel?'checked':''} onclick="event.stopPropagation();toggleSel(${pi},'${p.id}')">
                <span>${isSel?'✓ Selected':'Select this piece'}</span>
              </div>
              <a class="view-link" href="${p.variantId ? 'https://openroadinteriors.com/products/'+p.url.split('/products/')[1]+'?variant='+p.variantId : p.url}" target="_blank">View full details on our site →</a>
            </div></div>`;
          });
          html+='</div></div>';
        });
      }
      html+='</div>';
    });

    /* SELECTIONS SUMMARY */
    const sel=S.sel;
    html+=`<div class="cart-box"><h3>🛒 Your selections & estimated total</h3>`;
    if(!sel.length){
      html+=`<p style="font-size:14px;color:var(--mid);padding:10px 0">Select products above to build your order.</p>`;
    } else {
      sel.forEach(sp=>{
        const ups=upgradePrice(sp);
        const mat=sp.material||getDefaultMaterial(sp.product);
        const basePrice=getMaterialPrice(sp.product,mat);
        const optStr=[mat,...Object.values(sp.opts||{}).filter(o=>o&&!o.startsWith('No ')&&!o.includes('standard')&&!o.includes('Standard'))].filter(Boolean).join(' · ');
        html+=`<div class="ci">
          <div><div class="ci-name">${sp.product.name}</div>${optStr?`<div class="ci-opts">${optStr}</div>`:''}</div>
          <div class="ci-price">$${(basePrice+ups).toLocaleString()}</div>
        </div>`;
      });
      html+=`<div class="ctotal"><span>Estimated total</span><span>$${selTotal().toLocaleString()}</span></div>`;
    }
    html+=`</div>`;

    /* SEND TO TEAM + CONTACT */
    html+=`
    <div class="team-box">
      <h3>📬 Send your selections to our team</h3>
      <p>We'll review your measurements and selections and reach out with personalized recommendations, pricing, and availability.</p>
      <label class="check-row" style="margin-bottom:16px;padding:12px 14px;background:var(--green-light);border-radius:var(--r-sm);border:1px solid var(--border);">
        <input type="checkbox" id="tf-quote" style="accent-color:var(--green);width:18px;height:18px;cursor:pointer;flex-shrink:0;">
        <span style="font-size:14px;font-weight:600;color:var(--dark);">Please include a full quote for my selected items</span>
      </label>
      <div id="teamFormWrap">
        <button class="team-toggle" onclick="toggleTeamForm()">
          Send to Our Team <span id="teamArrow">▼</span>
        </button>
        <div class="team-form" id="teamForm">
          <div class="team-summary">
            <strong>What we'll send your team:</strong><br>
            Your furniture type(s), all slideout measurements, width/depth specs, selected products &amp; options, and your optional message.
          </div>
          <div class="tf-row">
            <label>Name <span class=\"tf-required\">*</span></label>
            <input type="text" id="tf-name" placeholder="Your name">
          </div>
          <div class="tf-row">
            <label>Email <span class="tf-required">*</span></label>
            <input type="email" id="tf-email" placeholder="your@email.com">
          </div>
          <div class="tf-row">
            <label>Phone Number</label>
            <input type="tel" id="tf-phone" placeholder="(555) 555-5555">
          </div>
          <div class="tf-row">
            <label>Message <span style="font-weight:400;color:var(--mid)">(optional)</span></label>
            <textarea id="tf-message" placeholder="Any questions, extra details about your RV, timeline, etc."></textarea>
          </div>
          <button class="btn-send" id="btnSend" onclick="sendToTeam()">
            ✉️ Send to Our Team
          </button>
        </div>
      </div>
    </div>

    <div class="cbox">
      <h4>Questions? Our team is here to help.</h4>
      <p style="font-size:13px;color:var(--mid);margin-bottom:12px">We specialize in RV furniture fitting — call us and we'll walk you through every measurement.</p>
      <div class="citem">📞 <a href="tel:7174005651">717-400-5651</a></div>
      <div class="citem">📍 2460 Lincoln Highway, Suite 504, Lancaster, PA 17602</div>
      <div class="citem">✉️ <a href="https://openroadinteriors.com/pages/contact" target="_blank">Send a message →</a></div>
    </div>
    <button class="btn-restart" onclick="restart()">← Start over</button>`;

    app.innerHTML=html;
  }
}

/* ─────────────────────────────────────────────
   ACTIONS
───────────────────────────────────────────── */
function selCount(n){ S.numPieces=parseInt(n); render(); }
function startPieces(){ initPieces(S.numPieces); S.phase='piece'; S.sub='type'; S.cur=0; render(); }
function selType(t){ S.pieces[S.cur].type=t; render(); }
function selSlide(v){
  S.pieces[S.cur].slideout=v;
  if(v==='yes' || v==='raised'){
    // Set selection visually first, then open modal
    render();
    openSlideoutModal(v==='raised'?'raised':'flush');
  } else {
    render();
  }
}
function selDepth(v){
  S.pieces[S.cur].depth=v;
  if(v==='limited'){ render(); openClearanceModal(); }
  else { render(); }
}
function updWidth(v){
  S.pieces[S.cur].widthVal=v?parseInt(v):null;
  const btn=document.getElementById('w-btn');
  if(btn) btn.disabled=(!v && !S.pieces[S.cur].widthUnsure);
}
function toggleUnsure(){
  const p=S.pieces[S.cur];
  p.widthUnsure=!p.widthUnsure;
  // Don't clear widthVal — they may still want to type an estimate
  render();
}
function clearFeats(){ S.pieces[S.cur].features=[]; render(); }
function togFeat(f){
  const p=S.pieces[S.cur]; const i=p.features.indexOf(f);
  i>=0?p.features.splice(i,1):p.features.push(f);
  render();
}
function togFeatIdx(fi){
  const piece=S.pieces[S.cur];
  const featList=TYPE_FEATURES[piece.type]||[];
  const f=featList[parseInt(fi)];
  if(f!==undefined) togFeat(f);
}

const SUBS=['type','slideout','width','depth','features'];
function nextSub(){
  const idx=SUBS.indexOf(S.sub);
  const piece=S.pieces[S.cur];
  const skipDepth=['dinette','sleeper'].includes(piece.type);
  let next=SUBS[idx+1];
  if(next==='depth'&&skipDepth) next='features';
  if(next){ S.sub=next; render(); }
}
function goBack(){
  const idx=SUBS.indexOf(S.sub);
  const piece=S.pieces[S.cur];
  const skipDepth=['dinette','sleeper'].includes(piece.type);
  if(idx===0){
    if(S.cur>0){ S.cur--; S.sub='features'; } else { S.phase='count'; }
  } else {
    let prev=SUBS[idx-1];
    if(prev==='depth'&&skipDepth) prev='width';
    S.sub=prev;
  }
  render();
}
function finishPiece(){
  if(S.cur<S.numPieces-1){ S.cur++; S.sub='type'; } else { S.phase='results'; }
  render();
}

function toggleSel(pieceIdx,productId){
  const idx=S.sel.findIndex(s=>s.pieceIdx===pieceIdx&&s.product.id===productId);
  if(idx>=0){ S.sel.splice(idx,1); }
  else {
    const product=P.find(p=>p.id===productId);
    if(!product) return;
    const optsDef=getProductOptions(product);
    const defaultOpts={};
    var feats=S.pieces[pieceIdx]?S.pieces[pieceIdx].features:[];
    for(const[k,cfg] of Object.entries(optsDef)){
      if(k==='mechanism'){
        // Smart-default based on features selected in quiz
        const layFlat = cfg.opts.find(o=>o.includes('Lay Flat'));
        const electric = cfg.opts.find(o=>o.includes('Electric Controls'));
        const inside = cfg.opts.find(o=>o.includes('Inside Handle'));
        if(feats.includes('Lay Flat Recline') && layFlat) defaultOpts[k]=layFlat;
        else if((feats.includes('Electric Controls (Inside Button)')||feats.includes('Electric Controls (Outside Button)')) && electric) defaultOpts[k]=electric;
        else if(feats.includes('Inside Handle') && inside) defaultOpts[k]=inside;
        else defaultOpts[k]=cfg.opts[0];
      } else if(k==='headrest'){
        if(feats.includes('Head Tilt (Electric Only)')) defaultOpts[k]=cfg.opts.find(o=>o.includes('Head Tilt'))||cfg.opts[0];
        else defaultOpts[k]=cfg.opts[0];
      } else { defaultOpts[k]=cfg.opts[0]; }
    }
    const pendingKey=pieceIdx+':'+productId;
    const defMat=S.pendingMat[pendingKey]||getDefaultMaterial(product);
    S.sel.push({pieceIdx,product,opts:defaultOpts,material:defMat});
  }
  render();
}

function setOptIdx(btn){
  const pi=parseInt(btn.dataset.pi);
  const pid=btn.dataset.pid;
  const key=btn.dataset.key;
  const sp=S.sel.find(s=>s.pieceIdx===pi&&s.product.id===pid);
  if(!sp) return;
  const optsDef=getProductOptions(sp.product);
  const cfg=optsDef[key];
  if(!cfg) return;
  const val=cfg.opts[parseInt(btn.dataset.oi)];
  setOpt(pi,pid,key,val);
}

function setOpt(pieceIdx,productId,key,value){
  const sp=S.sel.find(s=>s.pieceIdx===pieceIdx&&s.product.id===productId);
  if(!sp) return;
  sp.opts[key]=value;
  // If switching mechanism away from electric, clear head tilt (requires electric)
  if(key==='mechanism' && !value.includes('Electric Controls')){
    const optsDef=getProductOptions(sp.product);
    if(optsDef.headrest && sp.opts.headrest && sp.opts.headrest.includes('Head Tilt')){
      sp.opts.headrest=optsDef.headrest.opts[0]; // reset to 'No Head Tilt'
    }
  }
  // If selecting head tilt, ensure electric is selected
  if(key==='headrest' && value.includes('Head Tilt')){
    const optsDef=getProductOptions(sp.product);
    if(optsDef.mechanism){
      const elec=optsDef.mechanism.opts.find(o=>o.includes('Electric Controls'));
      if(elec && sp.opts.mechanism && !sp.opts.mechanism.includes('Electric Controls')) sp.opts.mechanism=elec;
    }
  }
  render();
}

/* ─────────────────────────────────────────────
   SHOPIFY CART INTEGRATION
   Uses /cart/add.js (Shopify Ajax API)
   If variantIds are present, adds all at once.
   Falls back to contact page with selections note.
───────────────────────────────────────────── */
function addToCart(){
  const sel=S.sel;
  if(!sel.length) return;

  const withVariants=sel.filter(sp=>sp.product.variantId);

  if(withVariants.length){
    // Build Shopify cart URL: /cart/VARIANTID:QTY,VARIANTID2:QTY
    // This works cross-domain with no CORS issues — just a direct link
    const cartItems=withVariants.map(sp=>sp.product.variantId+':1').join(',');
    const cartUrl='https://openroadinteriors.com/cart/'+cartItems;
    window.location.href=cartUrl;
    return;
  }

  // Fallback if no variant IDs: open contact page with selections pre-filled
  const note=sel.map(sp=>{
    const mat=sp.material||getDefaultMaterial(sp.product);
    const optStr=[mat,...Object.values(sp.opts||{}).filter(o=>o&&!o.startsWith('No ')&&!o.includes('standard'))].filter(Boolean).join(', ');
    return `${sp.product.name}${optStr?' ('+optStr+')':''} — $${(getMaterialPrice(sp.product,mat)+upgradePrice(sp)).toLocaleString()}`;
  }).join('\n');
  const msg=`I'd like to order:\n${note}\n\nEstimated total: $${selTotal().toLocaleString()}`;
  window.open('https://openroadinteriors.com/pages/contact?contact[Body]='+encodeURIComponent(msg),'_blank');
}

function restart(){
  S={phase:'count',sub:'type',numPieces:1,pieces:[],cur:0,sel:[]};
  render();
}

render();
</script>
